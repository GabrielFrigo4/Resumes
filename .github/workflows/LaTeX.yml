name: Compilar LaTeX e Gerar PDF

on:
  push:
    branches:
      - main
      - master

jobs:
  build_latex:
    name: Build LaTeX (Busca Automática)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fazer Checkout do código
        uses: actions/checkout@v4

      - name: Compilar todos os arquivos LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "**/*.tex"
          continue_on_error: true

      - name: Organizar PDFs para Release
        id: prep_files
        run: |
          mkdir -p dist
          # Busca todos os PDFs gerados e os centraliza na pasta 'dist'
          # Isso resolve o problema de links de download na Release
          find . -name "*.pdf" -not -path "./dist/*" -exec cp {} dist/ \;
          
          if [ -z "$(ls -A dist)" ]; then
            echo "Erro: Nenhum PDF foi gerado."
            exit 1
          fi

      - name: Deletar Release e Tag 'latest' antigas
        uses: dev-drprasad/delete-tag-and-release@v1.1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          delete_release: true
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar Links da Release
        id: meta_step
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          export TZ="America/Sao_Paulo"
          echo "DATA_FORMATADA=$(date +'%d/%m/%Y %H:%M')" >> "$GITHUB_OUTPUT"

          {
            echo 'PDF_LINKS<<EOF'
            for pdf in dist/*.pdf; do
              name=$(basename "$pdf")
              echo "- [\`$name\`](https://github.com/${{ github.repository }}/releases/download/latest/$name)"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Criar Nova Release 'latest'
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: "Documentos Atualizados (${{ steps.meta_step.outputs.DATA_FORMATADA }})"
          body: |
            ### 📄 Documentos Gerados
            Esta release contém as versões mais recentes dos documentos compilados automaticamente.

            ${{ steps.meta_step.outputs.PDF_LINKS }}

            ---
            **ID do Commit:** `${{ github.sha }}`
          files: "dist/*.pdf"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
